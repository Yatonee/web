# Cấu hình Build & Start - Render.com
name: trueface-backend
buildCommand: pip install -r requirements.txt
startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
envVars:
  - key: FLASK_ENV
    value: production
  - key: PORT
    value: 10000
  - key: PYTHON_VERSION
    value: "3.12.3"
services:
  - type: web
    name: your-app
    env: python
    runtime: python312
