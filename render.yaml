# Cấu hình Render - Deploy Web Backend
# Chỉ định Python version bằng environment variable
envVars:
  - key: FLASK_ENV
    value: production
  - key: PORT
    value: 10000
  - key: PYTHON_VERSION
    value: "3.12.3"
services:
  - type: admin
    name: trueface-backend
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /
