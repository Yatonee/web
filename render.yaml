# Cấu hình Render - Deploy Web Backend
preDeployCommand: pip install -r requirements.txt
deployCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
healthCheckPath: /
envVars:
  - key: FLASK_ENV
    value: production
  - key: PORT
    value: 10000
  - key: PYTHON_VERSION
    value: "3.12.3"
services:
  - type: web
    name: trueface-backend
    env: python
    runtime: python312
