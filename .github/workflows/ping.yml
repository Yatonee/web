name: Keep Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      PING_URL: ${{ vars.PING_URL }}
    steps:
      - name: Ping API
        run: |
          if [ -z "$PING_URL" ]; then
            echo "PING_URL not set. Add it as a repository variable (Settings → Variables)."
            exit 1
          fi
          echo "Pinging API at $(date): $PING_URL"
          response=$(curl -s -o /dev/null -w "%{http_code}" -m 30 "$PING_URL")
          if [ "$response" = "200" ]; then
            echo "✓ API is alive (HTTP $response)"
          else
            echo "✗ API returned HTTP $response"
            exit 1
          fi
